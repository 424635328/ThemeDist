name: Build and Deploy

on:
  # Push to main — keep Netlify in sync with Vercel's auto-deploy
  push:
    branches: [main]

  # Monthly rebuild to refresh static calendar data
  schedule:
    - cron: '0 0 1 * *'

  workflow_dispatch:

jobs:
  deploy-netlify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build with Netlify adapter
        run: ADAPTER=netlify npm run build
        env:
          URL: ${{ secrets.URL }}

      - name: Deploy to Netlify
        run: npx netlify-cli deploy --prod --site ${{ secrets.NETLIFY_SITE_ID }} --auth ${{ secrets.NETLIFY_AUTH_TOKEN }}

  deploy-vercel:
    runs-on: ubuntu-latest
    # Only run if Vercel credentials are configured
    if: ${{ github.event_name != 'push' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build with Vercel adapter
        run: npm run build
        env:
          URL: ${{ secrets.URL }}

      - name: Deploy to Vercel
        run: npx vercel deploy --prod --token ${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}