name: Build and Deploy to Netlify

on:
  # 每月一号 UTC 午夜自动重建（主题轮换）
  schedule:
    - cron: '0 0 1 * *'
  push:
    branches:
      - main
  # 手动触发
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build with Netlify adapter
        run: ADAPTER=netlify npm run build
        env:
          URL: ${{ secrets.URL }}

      - name: Deploy to Netlify using Official CLI
        # 使用 npx 运行官方 netlify-cli 进行部署，它会自动读取 netlify.toml 里的 publish 目录并打包关联的 Serverless 函数
        run: npx netlify-cli deploy --prod --site ${{ secrets.NETLIFY_SITE_ID }} --auth ${{ secrets.NETLIFY_AUTH_TOKEN }}