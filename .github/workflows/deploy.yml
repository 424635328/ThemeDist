name: Build and Deploy to Netlify

on:
  # 每月一号 UTC 午夜自动重建（主题轮换）
  schedule:
    - cron: '0 0 1 * *'
  # 手动触发
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write       # 允许向 commit 写入评论
      deployments: write    # 允许更新 GitHub Deployments
      statuses: write       # 新增：解决 Resource not accessible 报错，允许更新 Commit 部署状态

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build with Netlify adapter
        run: ADAPTER=netlify npm run build
        env:
          URL: ${{ secrets.URL }}

      - name: Deploy to Netlify
        uses: nwtgck/actions-netlify@v3
        with:
          publish-dir: 'dist'
          functions-dir: '.netlify/v1/functions'
          production-deploy: true
          production-branch: main
          github-token: ${{ secrets.GITHUB_TOKEN }}
          enable-commit-comment: true
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}